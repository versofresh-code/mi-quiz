<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="2;url=https://script.google.com/macros/s/AKfycbzf4MY403I7451prlGdHJWMLqjyQm11ZLo2eYjPXgj1CIfTlhjQyfYZkdj53Hx1djj2/exec">
  <title>🎓 Plataforma Educativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 50px 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo { font-size: 4rem; margin-bottom: 15px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { font-size: 1rem; opacity: 0.85; margin-bottom: 30px; }
    
    .loader-container { margin: 30px 0; }
    .loader {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .loading-text {
      font-size: 1.1rem;
      font-weight: 600;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff6b6b, #ffd700);
      background-size: 200% 100%;
      border-radius: 10px;
      animation: progressAnim 2s ease-in-out forwards, shimmer 1.5s infinite;
    }
    @keyframes progressAnim {
      from { width: 0%; }
      to { width: 100%; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .manual-link {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    .manual-link a {
      color: #ffd700;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 30px;
      border: 2px solid #ffd700;
      border-radius: 50px;
      display: inline-block;
      transition: all 0.3s ease;
    }
    .manual-link a:hover {
      background: #ffd700;
      color: #333;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
    }
    
    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }
    .feature {
      font-size: 0.8rem;
      opacity: 0.7;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    @media (max-width: 480px) {
      .container { padding: 35px 25px; }
      h1 { font-size: 1.4rem; }
      .logo { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎓</div>
    <h1>Plataforma Educativa</h1>
    <p class="subtitle">Sistema de Evaluación Interactiva</p>
    
    <div class="loader-container">
      <div class="loader"></div>
      <p class="loading-text">Cargando plataforma...</p>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    
    <div class="manual-link">
      <p style="font-size:0.85rem;opacity:0.7;margin-bottom:12px;">Si no redirige automáticamente:</p>
      <a href="https://script.google.com/macros/s/AKfycbzf4MY403I7451prlGdHJWMLqjyQm11ZLo2eYjPXgj1CIfTlhjQyfYZkdj53Hx1djj2/exec">🚀 Entrar a la Plataforma</a>
    </div>
    
    <div class="features">
      <span class="feature">📝 Quizzes</span>
      <span class="feature">📊 Estadísticas</span>
      <span class="feature">🏆 Ranking</span>
      <span class="feature">📄 PDF</span>
    </div>
  </div>
</body>
</html>
